<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sleep Routine</title>
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f2f2f2;
  padding:20px;
}
h1{text-align:center;}
.box{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}
label{
  display:block;
  margin:8px 0;
}
</style>
</head>
<body>

<h1>🌙 Sleep Routine</h1>

<div class="box">
<h2>Night</h2>
<label><input type="checkbox"> 20:00 入浴</label>
<label><input type="checkbox"> 20:30 デジタル終了</label>
<label><input type="checkbox"> 21:00 ToDoを3つ</label>
<label><input type="checkbox"> 呼吸＋ストレッチ</label>
<label><input type="checkbox"> 21:30 就寝</label>
</div>

<div class="box">
<h2>Morning</h2>
<label><input type="checkbox"> 5:30 カーテン開ける</label>
<label><input type="checkbox"> 水を1杯</label>
<label><input type="checkbox"> 背伸び60秒</label>
<label><input type="checkbox"> 6:00-8:00 クリエイティブ</label>
</div>

</body>
</html>
